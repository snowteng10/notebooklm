<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CT學習卡與測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        html, body, #root {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8fafc;
        }
        .app-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 核心 34 題精準數據庫
        const finalDatabase = [
            { id: 1, question: "CT 檢查基本流程的五大核心步驟？", answer: "1.確認醫囑 2.病人確認 3.檢查前準備 4.掃描執行 5.檢查後處理。", topic: "檢查流程" },
            { id: 2, question: "在「確認醫囑（Order）」階段需核對哪三項？", answer: "檢查部位、是否使用對比劑、特殊需求（如急診/ICU/危急病人）。", topic: "檢查流程" },
            { id: 3, question: "「病人確認」時需核對哪些身分資訊？", answer: "姓名、出生年月日（透過健保卡或手圈核對）。", topic: "檢查流程" },
            { id: 4, question: "「病人確認」階段需詢問的過敏與病史？", answer: "對比劑過敏史、糖尿病或氣喘病史。", topic: "檢查流程" },
            { id: 5, question: "「病人確認」時關於糖尿病藥物的特定重點？", answer: "需確認病人是否正在使用 Metformin。", topic: "檢查流程" },
            { id: 6, question: "「檢查前準備」關於著裝的規定？", answer: "去除金屬物品並更換檢查衣。", topic: "檢查流程" },
            { id: 7, question: "檢查前告知病人「禁食」的目的為何？", answer: "確保檢查安全及影像品質（預防對比劑引發嘔吐誤吸）。", topic: "檢查流程" },
            { id: 8, question: "檢查前告知病人「喝水」或「漲尿」的目的？", answer: "協助區分腸胃道或充盈膀胱以利診斷。", topic: "檢查流程" },
            { id: 9, question: "「掃描執行」中關於定位（Scout）的要點？", answer: "需確認各部位的定位點（Landmark）。", topic: "檢查流程" },
            { id: 10, question: "「掃描執行」中放射師需設定哪些軟體細節？", answer: "選擇 Protocol（掃描條件）、設定掃描範圍與參數。", topic: "檢查流程" },
            { id: 11, question: "掃描執行前需對病人進行什麼溝通？", answer: "解釋呼吸配合（如吸氣、憋氣指令）。", topic: "檢查流程" },
            { id: 12, question: "「檢查後處理」包含哪些影像重建技術？", answer: "MPR（多平面重建）、MIP（最大強度投影）、3D 重建。", topic: "檢查流程" },
            { id: 13, question: "對比劑安全性：碘對比劑可能引發的風險？", answer: "可能引起過敏反應。", topic: "對比劑安全" },
            { id: 14, question: "對比劑安全性：臨床上如何評估病人腎功能？", answer: "查詢 eGFR（腎絲球過濾率）指標。", topic: "對比劑安全" },
            { id: 15, question: "對比劑安全性：注射過程中需特別防範的情況？", answer: "注意滲漏（Extravasation）。", topic: "對比劑安全" },
            { id: 16, question: "緊急狀況處理：常見的過敏反應症狀有哪些？", answer: "蕁麻疹、呼吸困難。", topic: "緊急狀況" },
            { id: 17, question: "對比劑目的：對血管與組織的主要作用？", answer: "提高血管與組織的對比度。", topic: "對比劑概念" },
            { id: 18, question: "對比劑目的：臨床上主要用於偵測哪些病徵？", answer: "偵測腫瘤、出血或感染。", topic: "對比劑概念" },
            { id: 19, question: "給藥方式：對比劑最常見的進入途徑？", answer: "靜脈注射（IV injection）。", topic: "對比劑概念" },
            { id: 20, question: "技術細節：CTA 檢查中採用的關鍵偵測技術？", answer: "Bolus tracking 技術（偵測定位與顯影順序）。", topic: "對比劑概念" },
            { id: 21, question: "對比劑注射監控：除了速度，還需監控什麼？", answer: "監控壓力（Pressure）。", topic: "對比劑概念" },
            { id: 22, question: "縮寫必背：MPR 的全稱？", answer: "Multiplanar Reconstruction（多平面重建）。", topic: "常用縮寫" },
            { id: 23, question: "縮寫必背：MPR 重建包含哪兩個主要切面？", answer: "COR（冠狀面）與 SAG（矢狀面）。", topic: "常用縮寫" },
            { id: 24, question: "縮寫必背：MIP 的全稱？", answer: "Maximum Intensity Projection。", topic: "常用縮寫" },
            { id: 25, question: "縮寫必背：CTDI 與 DLP 的用途？", answer: "與輻射劑量監測相關的參數。", topic: "常用縮寫" },
            { id: 26, question: "縮寫必背：eGFR 的中文名稱？", answer: "腎絲球過濾率。", topic: "常用縮寫" },
            { id: 27, question: "檢查項目縮寫：NCLD 代表什麼？", answer: "Non Contrast Low Dose 無對比劑低劑量", topic: "常用縮寫" },
            { id: 28, question: "檢查項目縮寫：NCSD 代表什麼？", answer: "Non-Contrast Standard Dose 無對比劑標準劑量", topic: "常用縮寫" },
            { id: 29, question: "臨床項目縮寫：TCC 代表什麼？", answer: "移行上皮細胞癌。", topic: "常用縮寫" },
            { id: 30, question: "臨床項目縮寫：HCC 代表什麼？", answer: "肝細胞癌。", topic: "常用縮寫" },
            { id: 31, question: "臨床項目縮寫：RCC 代表什麼？", answer: "腎細胞癌。", topic: "常用縮寫" },
            { id: 32, question: "臨床項目縮寫：PAOD 代表什麼？", answer: "周邊動脈阻塞疾病。", topic: "常用縮寫" },
            { id: 33, question: "臨床項目縮寫：PE 代表什麼？", answer: "肺栓塞。", topic: "常用縮寫" },
            { id: 34, question: "臨床項目縮寫：DVT 代表什麼？", answer: "深部靜脈栓塞。", topic: "常用縮寫" }
        ];

        // 純 SVG 圖標元件
        const Icons = {
            BookOpen: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>,
            CheckSquare: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            TrendingUp: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            ShieldCheck: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
            ChevronLeft: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg>,
            ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg>,
            Zap: () => <svg className="w-4 h-4 fill-amber-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>,
            CheckCircle: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>,
            AlertCircle: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        };

        function App() {
            const [activeTab, setActiveTab] = useState('cards');
            
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('ct_final_cards_v5');
                return saved ? JSON.parse(saved) : finalDatabase.map(c => ({ ...c, status: 'unlearned' }));
            });

            const [quizHistory, setQuizHistory] = useState(() => {
                const saved = localStorage.getItem('ct_final_history_v5');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('ct_final_cards_v5', JSON.stringify(cards));
            }, [cards]);

            useEffect(() => {
                localStorage.setItem('ct_final_history_v5', JSON.stringify(quizHistory));
            }, [quizHistory]);

            const topics = useMemo(() => {
                return ['全部', ...new Set(cards.map(c => c.topic))];
            }, [cards]);

            const [selectedTopic, setSelectedTopic] = useState('全部');
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            const filteredCards = useMemo(() => {
                if (selectedTopic === '全部') return cards;
                return cards.filter(c => c.topic === selectedTopic);
            }, [cards, selectedTopic]);

            useEffect(() => {
                setCurrentCardIndex(0);
                setIsFlipped(false);
            }, [selectedTopic]);

            const changeCardStatus = (id, newStatus) => {
                setCards(prev => prev.map(c => c.id === id ? { ...c, status: newStatus } : c));
            };

            const [quizTopic, setQuizTopic] = useState('全部');
            const [quizStarted, setQuizStarted] = useState(false);
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isAnswerSubmitted, setIsAnswerSubmitted] = useState(false);
            const [quizScore, setQuizScore] = useState(0);
            const [quizSummary, setQuizSummary] = useState(null);

            const startQuiz = () => {
                const pool = quizTopic === '全部' ? cards : cards.filter(c => c.topic === quizTopic);
                if (pool.length < 4) {
                    alert('該單元題目過少，無法建立四選一試卷！');
                    return;
                }

                const shuffled = [...pool].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, Math.min(5, shuffled.length));

                const generated = selected.map(q => {
                    const distractorsPool = cards.filter(c => c.id !== q.id).map(c => c.answer);
                    const randomDistractors = [...new Set(distractorsPool)].sort(() => 0.5 - Math.random()).slice(0, 3);
                    const options = [...randomDistractors, q.answer].sort(() => 0.5 - Math.random());
                    return { ...q, options, correctAnswer: q.answer };
                });

                setQuizQuestions(generated);
                setCurrentQuizIndex(0);
                setSelectedAnswer(null);
                setIsAnswerSubmitted(false);
                setQuizScore(0);
                setQuizSummary(null);
                setQuizStarted(true);
            };

            const submitQuizAnswer = () => {
                if (!selectedAnswer) return;
                const isCorrect = selectedAnswer === quizQuestions[currentQuizIndex].correctAnswer;
                if (isCorrect) setQuizScore(p => p + 1);
                setIsAnswerSubmitted(true);
            };

            const advanceQuiz = () => {
                if (currentQuizIndex + 1 < quizQuestions.length) {
                    setCurrentQuizIndex(p => p + 1);
                    setSelectedAnswer(null);
                    setIsAnswerSubmitted(false);
                } else {
                    const finalScore = selectedAnswer === quizQuestions[currentQuizIndex].correctAnswer ? quizScore + 1 : quizScore;
                    const summary = {
                        date: new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        topic: quizTopic,
                        total: quizQuestions.length,
                        score: finalScore
                    };
                    setQuizSummary(summary);
                    setQuizHistory(prev => [summary, ...prev].slice(0, 10));
                    setQuizStarted(false);
                }
            };

            const stats = useMemo(() => {
                const total = cards.length;
                const master = cards.filter(c => c.status === 'master').length;
                const review = cards.filter(c => c.status === 'review').length;
                const unlearned = cards.filter(c => c.status === 'unlearned').length;

                const topicBreakdown = topics.filter(t => t !== '全部').map(t => {
                    const match = cards.filter(c => c.topic === t);
                    return {
                        name: t,
                        total: match.length,
                        master: match.filter(c => c.status === 'master').length,
                        review: match.filter(c => c.status === 'review').length
                    };
                });

                return { total, master, review, unlearned, topicBreakdown };
            }, [cards, topics]);

            return (
                <div className="app-container max-w-md mx-auto bg-white border-x border-slate-200 shadow-2xl relative">
                    <header className="bg-slate-900 text-slate-50 px-4 py-4 flex justify-between items-center shrink-0 shadow-md">
                        <div className="flex items-center space-x-2">
                            <Icons.ShieldCheck />
                            <h1 className="text-base font-black tracking-wide">CT學習卡與測驗</h1>
                        </div>
                        <span className="text-[10px] bg-indigo-500/20 border border-indigo-400/30 text-indigo-300 px-2.5 py-0.5 rounded-full font-mono font-bold">V2.0</span>
                    </header>

                    <main className="flex-1 overflow-y-auto custom-scrollbar p-4 bg-slate-50">
                        {activeTab === 'cards' && (
                            <div className="flex flex-col h-full space-y-3.5">
                                <div className="flex space-x-1.5 overflow-x-auto pb-1 custom-scrollbar shrink-0">
                                    {topics.map(t => (
                                        <button
                                            key={t}
                                            onClick={() => setSelectedTopic(t)}
                                            className={`px-3.5 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${selectedTopic === t ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200'}`}
                                        >
                                            {t}
                                        </button>
                                    ))}
                                </div>

                                {filteredCards.length > 0 ? (
                                    <div className="flex-1 flex flex-col justify-between py-1">
                                        <div onClick={() => setIsFlipped(!isFlipped)} className="w-full h-72 perspective-1000 cursor-pointer touch-manipulation">
                                            <div className={`w-full h-full duration-500 transform-style-3d relative ${isFlipped ? 'rotate-y-180' : ''}`}>
                                                <div className="absolute inset-0 bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col justify-between backface-hidden">
                                                    <div className="flex justify-between items-center">
                                                        <span className="bg-slate-100 text-slate-700 text-[10px] font-bold px-2.5 py-0.5 rounded">{filteredCards[currentCardIndex].topic}</span>
                                                        <span className="text-xs font-mono font-bold text-slate-400">{currentCardIndex + 1} / {filteredCards.length}</span>
                                                    </div>
                                                    <div className="text-center text-slate-800 text-base sm:text-lg font-bold px-1 py-4 leading-relaxed">{filteredCards[currentCardIndex].question}</div>
                                                    <div className="text-center text-[10px] text-slate-400">💡 點擊卡片翻看正確答案</div>
                                                </div>
                                                <div className="absolute inset-0 bg-slate-900 text-slate-50 rounded-2xl p-6 flex flex-col justify-between backface-hidden rotate-y-180">
                                                    <div className="flex justify-between items-center">
                                                        <span className="bg-indigo-600 text-indigo-100 text-[10px] font-bold px-2.5 py-0.5 rounded">正確解答</span>
                                                        <span className="text-xs font-mono font-bold text-slate-500">{currentCardIndex + 1} / {filteredCards.length}</span>
                                                    </div>
                                                    <div className="text-left text-slate-100 text-sm sm:text-base font-semibold overflow-y-auto max-h-40 custom-scrollbar pr-1 leading-relaxed">{filteredCards[currentCardIndex].answer}</div>
                                                    <div className="text-center text-[10px] text-slate-500">🔄 點擊卡片看回題目</div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3 my-2">
                                            <button onClick={(e) => { e.stopPropagation(); changeCardStatus(filteredCards[currentCardIndex].id, 'review'); }} className={`py-3 rounded-xl border text-xs font-bold flex items-center justify-center space-x-1.5 ${filteredCards[currentCardIndex].status === 'review' ? 'bg-amber-50 border-amber-400 text-amber-700 font-black' : 'bg-white border-slate-200 text-slate-600'}`}>
                                                <Icons.AlertCircle /><span>標記再複習</span>
                                            </button>
                                            <button onClick={(e) => { e.stopPropagation(); changeCardStatus(filteredCards[currentCardIndex].id, 'master'); }} className={`py-3 rounded-xl border text-xs font-bold flex items-center justify-center space-x-1.5 ${filteredCards[currentCardIndex].status === 'master' ? 'bg-emerald-50 border-emerald-400 text-emerald-700 font-black' : 'bg-white border-slate-200 text-slate-600'}`}>
                                                <Icons.CheckCircle /><span>這題我會了</span>
                                            </button>
                                        </div>

                                        <div className="flex items-center justify-between px-1">
                                            <button disabled={currentCardIndex === 0} onClick={() => { setCurrentCardIndex(p => p - 1); setIsFlipped(false); }} className="p-3 bg-white border border-slate-200 rounded-full text-slate-600 disabled:opacity-40 disabled:pointer-events-none active:bg-slate-100 shadow-sm"><Icons.ChevronLeft /></button>
                                            <div className="text-xs font-bold text-slate-400 font-mono tracking-wide">頁數 {currentCardIndex + 1} / {filteredCards.length}</div>
                                            <button disabled={currentCardIndex === filteredCards.length - 1} onClick={() => { setCurrentCardIndex(p => p + 1); setIsFlipped(false); }} className="p-3 bg-white border border-slate-200 rounded-full text-slate-600 disabled:opacity-40 disabled:pointer-events-none active:bg-slate-100 shadow-sm"><Icons.ChevronRight /></button>
                                        </div>
                                    </div>
                                ) : <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-12"><p className="text-xs">目前暫無任何考題</p></div>}
                            </div>
                        )}

                        {activeTab === 'quiz' && (
                            <div className="flex flex-col h-full justify-between">
                                {!quizStarted ? (
                                    <div className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm my-auto space-y-5">
                                        <div className="text-center space-y-2">
                                            <div className="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-2xl shadow-inner"><Icons.CheckSquare /></div>
                                            <h3 className="text-base font-extrabold text-slate-800">隨機實戰強效模考</h3>
                                            <p className="text-xs text-slate-500 px-1 leading-relaxed">隨機抽取 5 題，並將其餘考題答案打散混淆成四選一選項，實現完美的實戰盲測！</p>
                                        </div>
                                        {quizSummary && (
                                            <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
                                                <span className="text-[10px] text-emerald-700 font-bold tracking-wider block mb-0.5">最新完成戰績</span>
                                                <div className="text-lg font-black text-emerald-800 font-mono">{quizSummary.score} / {quizSummary.total} 題</div>
                                                <span className="text-[9px] text-slate-400 block">{quizSummary.date} | {quizSummary.topic}</span>
                                            </div>
                                        )}
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-600 pl-0.5 block">篩選測驗單元</label>
                                            <select value={quizTopic} onChange={(e) => setQuizTopic(e.target.value)} className="w
